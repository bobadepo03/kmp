<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Kevin Music Player</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#1f2235;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}

.player{
width:340px;
background:
linear-gradient(
145deg,
#343752,
#2a2d45
);
border-radius:25px;
padding:20px;
box-shadow:
0 10px 30px rgba(0,0,0,.5),
inset 0 1px 1px rgba(255,255,255,.1);
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.topbar button{
background:none;
border:none;
color:white;
font-size:20px;
cursor:pointer;
}

.music-info{
text-align:center;
margin-bottom:20px;
}

.music-info h2{
font-size:20px;
margin-bottom:5px;
}

.music-info p{
font-size:14px;
color:#ccc;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search-box input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
outline:none;
background:#444866;
color:white;
}

.search-box button{
width:55px;
border:none;
border-radius:12px;
background:white;
cursor:pointer;
font-size:18px;
}

.time{
display:flex;
justify-content:space-between;
font-size:12px;
color:#ccc;
margin-bottom:8px;
}

.progress{
width:100%;
height:6px;
background:#666;
border-radius:20px;
overflow:hidden;
cursor:pointer;
margin-bottom:20px;
}

.progress-bar{
width:0%;
height:100%;
background:white;
transition:.1s;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.controls button{
border:none;
cursor:pointer;
}

.small{
width:42px;
height:42px;
border-radius:50%;
background:#4c5072;
color:white;
font-size:16px;
}

#playBtn{
width:60px;
height:60px;
border-radius:50%;
background:white;
color:#222;
font-size:22px;
}

.results,
.playlist{
max-height:220px;
overflow:auto;
}

.song{
position:relative;
background:#3b3f5d;
padding:12px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
}

.song h4{
font-size:14px;
margin-bottom:4px;
padding-right:35px;
}

.song p{
font-size:12px;
color:#ccc;
}

.deleteBtn{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
width:28px;
height:28px;
border:none;
border-radius:50%;
background:#ff4d4d;
color:white;
cursor:pointer;
}

#player{
width:0;
height:0;
overflow:hidden;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

@keyframes fadeOut {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-20px); }
}

.notification {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: #4caf50;
  color: white;
  padding: 12px 18px;
  border-radius: 8px;
  font-size: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  animation: fadeOut 2s ease forwards;
}

</style>
</head>

<body>

<div class="player">

<div class="topbar">

<button>☰</button>

<button>♡</button>

<button>＋</button>

</div>

<div class="music-info">

<h2 id="title">
Song title
</h2>

<p id="channel">
Singer name
</p>

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Cari music youtube..."
>

<button id="searchBtn">

🔍

</button>

</div>

<div class="time">

<span id="currentTime">
0:00
</span>

<span id="duration">
0:00
</span>

</div>

<div
class="progress"
id="progressContainer">

<div
class="progress-bar"
id="progressBar">
</div>

</div>

<div class="controls">

<button
class="small"
id="prevBtn">

⏮

</button>

<button id="playBtn">

▶

</button>

<button
class="small"
id="nextBtn">

⏭

</button>

</div>

<div
class="results"
id="results">
</div>

<h3
style="
margin-top:15px;
margin-bottom:10px;
font-size:14px;
color:#ccc;
">

Playlist

</h3>

<div
class="playlist"
id="playlistBox">
</div>

</div>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

const API_KEY =
"AIzaSyC507JjPNAqCt4R3m068i_YuivTXVMFLlw";

const searchInput =
document.getElementById(
"searchInput"
);

const searchBtn =
document.getElementById(
"searchBtn"
);

const results =
document.getElementById(
"results"
);

const title =
document.getElementById(
"title"
);

const channel =
document.getElementById(
"channel"
);

const playBtn =
document.getElementById(
"playBtn"
);

const playlistBox =
document.getElementById(
"playlistBox"
);

const progressBar =
document.getElementById(
"progressBar"
);

const progressContainer =
document.getElementById(
"progressContainer"
);

const currentTimeText =
document.getElementById(
"currentTime"
);

const durationText =
document.getElementById(
"duration"
);

let player;

let playlist = [];

let currentIndex = 0;

let isPlaying = false;

let progressInterval;

// ======================
// YOUTUBE READY
// ======================

function onYouTubeIframeAPIReady(){

player = new YT.Player(
'player',
{

height:'0',
width:'0',

playerVars:{
autoplay:1
},

events:{

'onStateChange':
onPlayerStateChange

}

});

}

// ======================
// SEARCH MUSIC
// ======================

async function searchMusic() {
  const query = searchInput.value;
  if (!query) return;

  results.innerHTML = "Searching...";

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&videoCategoryId=10&maxResults=10&key=${API_KEY}`
  );

  const data = await res.json();
  results.innerHTML = "";

  data.items.forEach(item => {
    const song = {
      id: item.id.videoId,
      title: item.snippet.title,
      artist: item.snippet.channelTitle
    };

    const div = document.createElement("div");
    div.className = "song";
    div.innerHTML = `
      <h4>${song.title}</h4>
      <p>${song.artist}</p>
    `;

    // Klik hasil pencarian hanya play lagu
    div.onclick = () => {
      playMusic(song);
    };

    results.appendChild(div);
  });
}

// Event listener tetap sama
searchBtn.onclick = searchMusic;
searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.keyCode === 13) {
    e.preventDefault();
    searchMusic();
  }
});


// ======================
// PLAY MUSIC
// ======================

function playMusic(song){

title.innerText =
song.title;

channel.innerText =
song.artist;

player.loadVideoById(
song.id
);

isPlaying = true;

playBtn.innerText =
"⏸";

startProgress();

}

// ======================
// PLAY PAUSE
// ======================

playBtn.onclick = ()=>{

if(!player) return;

if(isPlaying){

player.pauseVideo();

isPlaying = false;

playBtn.innerText =
"▶";

}else{

player.playVideo();

isPlaying = true;

playBtn.innerText =
"⏸";

}

};

// ======================
// NEXT
// ======================

function nextSong(){

if(!playlist.length)
return;

currentIndex++;

if(
currentIndex >=
playlist.length
){

currentIndex = 0;

}

playMusic(
playlist[currentIndex]
);

}

// ======================
// PREV
// ======================

function prevSong(){

if(!playlist.length)
return;

currentIndex--;

if(currentIndex < 0){

currentIndex =
playlist.length - 1;

}

playMusic(
playlist[currentIndex]
);

}

document
.getElementById(
"nextBtn"
)
.onclick = nextSong;

document
.getElementById(
"prevBtn"
)
.onclick = prevSong;

// ======================
// PROGRESS
// ======================

function startProgress(){

clearInterval(
progressInterval
);

progressInterval =
setInterval(()=>{

if(
player &&
isPlaying
){

const current =
player.getCurrentTime();

const duration =
player.getDuration();

const percent =

(current / duration)
* 100;

progressBar.style.width =
percent + "%";

currentTimeText.innerText =
formatTime(current);

durationText.innerText =
formatTime(duration);

}

},1000);

}

function formatTime(sec){

sec =
Math.floor(sec);

const minutes =
Math.floor(sec / 60);

const seconds =
sec % 60;

return (
minutes +
":" +
(seconds < 10
? "0" + seconds
: seconds)
);

}

// ======================
// SEEK SUPPORT MOBILE
// ======================

function seekMusic(clientX){

if(!player) return;

const rect =

progressContainer
.getBoundingClientRect();

const offsetX =

clientX - rect.left;

const width =
rect.width;

const percent =
offsetX / width;

const duration =
player.getDuration();

player.seekTo(
duration * percent,
true
);

}

// DESKTOP

progressContainer
.addEventListener(
"click",
(e)=>{

seekMusic(
e.clientX
);

});

// MOBILE TOUCH

progressContainer
.addEventListener(
"touchstart",
(e)=>{

seekMusic(
e.touches[0].clientX
);

});

// ======================
// AUTO NEXT
// ======================

function onPlayerStateChange(
event
){

if(
event.data ===
YT.PlayerState.ENDED
){

nextSong();

}

}

// ======================
// PLAYLIST
// ======================

function renderPlaylist(){

playlistBox.innerHTML =
"";

playlist.forEach(
(song,index)=>{

const div =
document.createElement(
"div"
);

div.className =
"song";

div.innerHTML = `

<h4>
${song.title}
</h4>

<p>
${song.artist}
</p>

<button
class="deleteBtn">

✕

</button>

`;

div.onclick = (e)=>{

if(
e.target.classList
.contains(
"deleteBtn"
)
) return;

currentIndex =
index;

playMusic(song);

};

div.querySelector(
".deleteBtn"
)
.onclick = ()=>{

playlist.splice(
index,
1
);

renderPlaylist();

};

playlistBox
.appendChild(div);

});

}

// Ambil tombol + dari topbar (tombol terakhir)
const addBtn = document.querySelector('.topbar button:last-child');

addBtn.onclick = () => {
  if (!player || !player.getVideoData) {
    showNotification('Tidak ada lagu yang sedang diputar!');
    return;
  }

  const videoData = player.getVideoData();
  if (!videoData || !videoData.video_id) {
    showNotification('Tidak ada lagu yang sedang diputar!');
    return;
  }

  const currentSong = {
    id: videoData.video_id,
    title: videoData.title || title.innerText,
    artist: channel.innerText || 'Unknown Artist'
  };

  // Cek apakah lagu sudah ada di playlist
  const alreadyExists = playlist.some(song => song.id === currentSong.id);
  if (alreadyExists) {
    showNotification('Lagu ini sudah ada di playlist!');
    return;
  }

  playlist.push(currentSong);
  renderPlaylist();

  // Efek pop pada tombol +
  addBtn.style.animation = 'pop 0.3s ease';
  setTimeout(() => addBtn.style.animation = '', 300);

  // Notifikasi melayang
  showNotification(`"${currentSong.title}" ditambahkan ke playlist 🎶`);
};

// Fungsi notifikasi melayang
function showNotification(message) {
  const notif = document.createElement('div');
  notif.className = 'notification';
  notif.innerText = message;
  document.body.appendChild(notif);
  setTimeout(() => notif.remove(), 2000);
}


</script>

</body>
</html>
